<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIKOS Analytics Portal</title>
    <link rel="icon" type="image/png" href="https://oikos.com.co/wp-content/uploads/2021/01/cropped-Favicon-Oikos-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue:  #004a99;
            --deep-blue:     #003366;
            --accent-cyan:   #00d2ff;
            --text-gray:     #64748b;
            --caledonia-red: #9C182F;
        }

        body, html {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8ecf9 100%);
            height: 100%; width: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        .circle-decoration { position: absolute; border-radius: 50%; opacity: 0.15; z-index: 0; filter: blur(50px); }
        .c1 { width: 300px; height: 300px; background: var(--primary-blue); top: -100px; left: -100px; animation: float 10s infinite; }
        .c2 { width: 400px; height: 400px; background: var(--accent-cyan); bottom: -150px; right: -150px; animation: float 12s infinite reverse; }
        @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,20px)} }

        .container {
            display: flex; background: white; border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            max-width: 1000px; width: 92%; min-height: 600px;
            position: relative; z-index: 1; overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

        .login-section { flex: 1.2; padding: 50px 60px; display: flex; flex-direction: column; justify-content: center; }
        .brand-name { font-family:'Outfit',sans-serif; font-size:32px; font-weight:800; color:var(--primary-blue); margin-bottom:40px; letter-spacing:-1px; }
        h2 { font-family:'Outfit',sans-serif; font-size:26px; color:#1e293b; margin-bottom:12px; }
        .instruction { font-size:13px; color:var(--text-gray); margin-bottom:25px; line-height:1.5; }
        .input-wrapper { display:flex; align-items:center; background:#f8fafc; border:2px solid #e2e8f0; border-radius:14px; transition:0.3s; margin-bottom:15px; }
        .input-wrapper input { flex:1; padding:18px; border:none; background:transparent; outline:none; font-size:15px; color:#1e293b; }
        .btn-request { width:100%; padding:12px; background:white; color:var(--primary-blue); border:2px solid var(--primary-blue); border-radius:12px; font-weight:700; cursor:pointer; margin-bottom:15px; font-size:12px; transition:0.3s; }
        .btn-request:hover { background:#f0f7ff; }
        .main-button { width:100%; padding:18px; background:var(--primary-blue); color:white; border:none; border-radius:14px; font-weight:700; font-family:'Outfit',sans-serif; cursor:pointer; transition:0.3s; box-shadow:0 10px 25px rgba(0,74,153,0.2); margin-bottom:12px; }
        .main-button:hover { background:var(--deep-blue); transform:translateY(-2px); }
        .main-button.caledonia { background:var(--caledonia-red); box-shadow:0 10px 25px rgba(156,24,47,0.2); }
        .main-button.caledonia:hover { background:#7a1325; }
        .btn-logout { width:100%; padding:10px 20px; background:white; color:#64748b; border:2px solid #e2e8f0; border-radius:10px; font-weight:600; font-family:'Outfit',sans-serif; cursor:pointer; transition:0.3s; font-size:12px; margin-top:20px; }
        .btn-logout:hover { background:#fef2f2; border-color:#fecaca; color:#dc2626; transform:translateY(-1px); }
        .welcome-section { flex:1; background:linear-gradient(150deg,var(--primary-blue) 0%,var(--deep-blue) 100%); padding:60px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:white; }
        .welcome-section h1 { font-family:'Outfit',sans-serif; font-size:44px; margin-bottom:20px; }
        .welcome-section p { font-size:15px; opacity:0.8; line-height:1.6; max-width:280px; }
        #status-msg { margin-top:15px; font-size:12px; text-align:center; font-weight:600; }

        /* =========================================================
           BADGE DE FECHA DE ACTUALIZACIÓN (login / selector)
        ========================================================= */
        #update-badge {
            display: none; /* se muestra via JS cuando hay dato */
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
            padding: 10px 18px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, #0077d9 60%, var(--accent-cyan) 140%);
            border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.4px;
            box-shadow: 0 6px 18px rgba(0,74,153,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
            animation: fadeInBadge 0.6s ease-out both;
            cursor: default;
        }
        #update-badge svg {
            width: 13px; height: 13px;
            flex-shrink: 0;
            opacity: 0.9;
        }
        @keyframes fadeInBadge {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* =========================================================
           BARRA DE ACTUALIZACIÓN DENTRO DEL BI
           Alargada y delgada, colgando del borde superior derecho
           (deja libre la esquina exacta donde vive el shield)
        ========================================================= */
        #bi-update-badge {
            display: none; /* JS lo pasa a flex cuando llega el dato */
            position: absolute;
            top: 0;
            right: 46px; /* pegada al lado izquierdo del botón del reloj */
            z-index: 100002; /* sobre el iframe, debajo del overlay del menú */
            pointer-events: none; /* barra solo informativa; los clics caen al shield de abajo */
            align-items: center;
            gap: 12px;
            height: 34px;
            padding: 0 22px;
            background: linear-gradient(90deg, rgba(0,38,77,0.96) 0%, rgba(0,74,153,0.96) 55%, rgba(0,110,200,0.96) 100%);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(0,210,255,0.45);
            border-top: none;
            border-right: none;
            border-radius: 0 0 0 14px;
            box-shadow: 0 6px 22px rgba(0,74,153,0.5), inset 0 -1px 0 rgba(0,210,255,0.5);
            white-space: nowrap;
            /* MODO NINJA: oculta por defecto, se despliega con el botón del reloj */
            opacity: 0;
            transform: translateY(-100%);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        #bi-update-badge.open {
            opacity: 1;
            transform: translateY(0);
        }

        /* Botón reloj — siempre visible en la esquina, despliega la barra */
        #btn-fecha-toggle {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 100004; /* sobre el shield para poder recibir el clic */
            width: 46px;
            height: 34px;
            background: linear-gradient(135deg, var(--primary-blue), #0077d9);
            border: none;
            border-radius: 0 0 0 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 14px rgba(0,74,153,0.5);
            transition: background 0.2s, box-shadow 0.2s;
        }
        #btn-fecha-toggle:hover {
            background: linear-gradient(135deg, var(--deep-blue), var(--primary-blue));
            box-shadow: 0 4px 18px rgba(0,74,153,0.65);
        }
        #btn-fecha-toggle svg {
            width: 17px; height: 17px;
            stroke: white; fill: none;
            transition: stroke 0.2s, transform 0.3s ease;
        }
        #btn-fecha-toggle.open {
            background: linear-gradient(135deg, #0091e0, var(--accent-cyan));
            box-shadow: 0 4px 18px rgba(0,210,255,0.55);
        }
        #btn-fecha-toggle.open svg { stroke: #0a1f33; transform: rotate(360deg); }
        .badge-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: pulseDot 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes pulseDot {
            0%, 100% { transform: scale(1);    opacity: 1;   }
            50%      { transform: scale(1.35); opacity: 0.55; }
        }
        .badge-label {
            font-size: 9.5px; font-weight: 700;
            letter-spacing: 1.6px; text-transform: uppercase;
            color: var(--accent-cyan);
        }
        .badge-sep {
            width: 1px; height: 15px;
            background: rgba(255,255,255,0.25);
            flex-shrink: 0;
        }
        .badge-fecha {
            font-family: 'Outfit', sans-serif;
            font-size: 13px; font-weight: 700;
            color: white; letter-spacing: 0.4px;
        }
        .badge-hora {
            font-size: 11px; font-weight: 700;
            color: #0a1f33;
            background: linear-gradient(135deg, var(--accent-cyan), #7de8ff);
            border-radius: 7px;
            padding: 2px 9px;
            letter-spacing: 0.6px;
            box-shadow: 0 0 10px rgba(0,210,255,0.45);
        }

        /* =========================================================
           BI CONTAINER
        ========================================================= */
        #bi-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 99999;
            background: white;
        }

        iframe { width:100%; height:100%; border:none; display:block; }

        /* =========================================================
           SHIELDS DE SEGURIDAD
        ========================================================= */
        .shield {
            position: absolute;
            z-index: 100002;
            background: rgba(255,255,255,0.01);
            cursor: pointer;
        }
        #shield-top-right   { top:0;    right:0;   width:180px; height:55px; }

        /* =========================================================
           OVERLAY — desenfoca el BI cuando el menú está abierto
        ========================================================= */
        #bi-overlay {
            position: absolute;
            inset: 0;
            z-index: 100003;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #bi-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        /* =========================================================
           BOTÓN MENÚ — alargado, pegado al fondo derecha
        ========================================================= */
        #btn-menu-toggle {
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: 100006;
            width: 220px;
            height: 36px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px 0 0 0;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 -3px 16px rgba(0,74,153,0.5);
            transition: background 0.2s, box-shadow 0.2s;
        }
        #btn-menu-toggle:hover {
            background: var(--deep-blue);
            box-shadow: 0 -4px 20px rgba(0,74,153,0.65);
        }
        #btn-menu-toggle svg {
            width: 16px; height: 16px; fill: white;
            transition: transform 0.35s ease;
        }
        #btn-menu-toggle.open svg { transform: rotate(180deg); }

        /* =========================================================
           PANEL GLASSMORPHISM
        ========================================================= */
        #menu-panel {
            position: absolute;
            bottom: 46px;
            right: 10px;
            z-index: 100005;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(22px) saturate(200%);
            -webkit-backdrop-filter: blur(22px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 18px;
            padding: 14px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.38);
            min-width: 215px;
            opacity: 0;
            transform: translateY(14px) scale(0.95);
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
        }
        #menu-panel.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            color: white;
            width: 100%;
            justify-content: flex-start;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .menu-btn svg { width:17px; height:17px; fill:white; flex-shrink:0; }

        #btn-home {
            background: rgba(0,74,153,0.88);
            box-shadow: 0 3px 12px rgba(0,74,153,0.45);
        }
        #btn-home:hover { background:rgba(0,51,102,0.97); transform:translateX(-3px); box-shadow:0 5px 16px rgba(0,74,153,0.55); }

        #btn-switch {
            background: rgba(5,150,105,0.88);
            box-shadow: 0 3px 12px rgba(5,150,105,0.45);
        }
        #btn-switch:hover { background:rgba(4,120,87,0.97); transform:translateX(-3px); box-shadow:0 5px 16px rgba(5,150,105,0.55); }

        #btn-pdf {
            background: rgba(185,28,28,0.88);
            box-shadow: 0 3px 12px rgba(185,28,28,0.45);
        }
        #btn-pdf:hover { background:rgba(153,18,18,0.97); transform:translateX(-3px); box-shadow:0 5px 16px rgba(185,28,28,0.55); }
        #btn-pdf:disabled { background:rgba(100,116,139,0.7); cursor:wait; transform:none; }

        #btn-helpdesk {
            background: rgba(124,58,237,0.88);
            box-shadow: 0 3px 12px rgba(124,58,237,0.45);
        }
        #btn-helpdesk:hover { background:rgba(109,40,217,0.97); transform:translateX(-3px); box-shadow:0 5px 16px rgba(124,58,237,0.55); }

        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        /* =========================================================
           PANTALLA DE PRECARGA
        ========================================================= */
        #preloader {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999999;
            background: linear-gradient(150deg, var(--primary-blue) 0%, var(--deep-blue) 100%);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            animation: fadeInLoader 0.25s ease-out;
        }
        #preloader.visible { display: flex; }
        @keyframes fadeInLoader { from{opacity:0} to{opacity:1} }

        .preloader-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 42px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            opacity: 0;
            animation: popIn 0.5s 0.1s ease-out forwards;
        }
        .preloader-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 0;
            animation: popIn 0.5s 0.25s ease-out forwards;
        }
        @keyframes popIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        /* Barra de progreso */
        .preloader-bar-wrap {
            width: 220px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 99px;
            overflow: hidden;
            opacity: 0;
            animation: popIn 0.5s 0.35s ease-out forwards;
        }
        .preloader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-cyan), white);
            border-radius: 99px;
            animation: barFill 1.8s 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
        }
        @keyframes barFill { 0%{width:0%} 60%{width:75%} 85%{width:90%} 100%{width:100%} }

        .preloader-report-name {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.85);
            opacity: 0;
            animation: popIn 0.5s 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="circle-decoration c1"></div>
    <div class="circle-decoration c2"></div>

    <!-- ── LOGIN ── -->
    <div class="container" id="login-ui">
        <div class="login-section">
            <div class="brand-name">OIKOS</div>
            <h2>Acceso al Portal</h2>
            <p class="instruction">Introduce tu correo y clave. Si ya ingresaste hoy, tu sesión estará activa por 12 horas.</p>
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="ejemplo@oikos.com.co" spellcheck="false">
            </div>
            <button class="btn-request" onclick="requestToken()">VALIDAR USUARIO</button>
            <div class="input-wrapper">
                <input type="text" id="token" placeholder="Clave Alfanumérica" maxlength="6">
            </div>
            <button class="main-button" onclick="verifyToken()">INGRESAR AL SISTEMA</button>
            <div id="status-msg"></div>
            <div id="update-badge"></div>
        </div>
        <div class="welcome-section">
            <h1>Analytics</h1>
            <p>Grupo Empresarial OIKOS S.A.S</p>
        </div>
    </div>

    <!-- ── PRELOADER ── -->
    <div id="preloader">
        <div class="preloader-logo">OIKOS</div>
        <div class="preloader-report-name" id="preloader-report-name">Cargando reporte...</div>
        <div class="preloader-bar-wrap">
            <div class="preloader-bar"></div>
        </div>
        <div class="preloader-sub">Analytics · Grupo Empresarial</div>
    </div>

    <!-- ── BI CONTAINER ── -->
    <div id="bi-container">

        <iframe id="bi-frame" src=""></iframe>

        <div id="bi-overlay" onclick="cerrarMenu()"></div>

        <div id="shield-top-right" class="shield" onclick="securityReset()"></div>

        <div id="menu-panel">
            <button class="menu-btn" id="btn-pdf" onclick="descargarPDF()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/>
                </svg>
                Ver / Descargar PDF
            </button>
            <button class="menu-btn" id="btn-helpdesk" onclick="abrirHelpDesk()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
                </svg>
                Help Desk
            </button>
            <div id="btn-switch-wrap"></div>
            <button class="menu-btn" id="btn-home" onclick="volverHome()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                Volver al Home
            </button>
        </div>

        <button id="btn-menu-toggle" onclick="toggleMenu()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 10l5 5 5-5z"/>
            </svg>
            MENÚ
        </button>

        <button id="btn-fecha-toggle" onclick="toggleFechaBar()" title="Fecha de actualización">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/>
            </svg>
        </button>
        <div id="bi-update-badge"></div>

    </div>

    <!-- Widget oficial de Tally: expone window.Tally.openPopup(...) -->
    <script async src="https://tally.so/widgets/embed.js"></script>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbw9UDGQStkNP9QwUS0X-uR2WFFouTQv0xR_0wpfwdwfw0maBm2F5Zs5GLcd3hFicIia9g/exec";
        const SESSION_DURATION = 43200000;
        const REDIRECT_URL = "https://www.grupooikos.com/";

        let reporteActivo = null;
        let menuOpen = false;

        // ============================================================
        // ANTI-INSPECCIÓN
        // ============================================================
        (function() {
            const noop = () => {};
            ['log','debug','info','warn','error','dir','dirxml','trace','profile','profileEnd','table','clear']
                .forEach(m => { console[m] = noop; });
        })();

        let devtoolsDetected = false;
        setInterval(() => {
            if ((window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) && !devtoolsDetected) {
                devtoolsDetected = true; window.location.replace(REDIRECT_URL);
            }
        }, 500);
        setInterval(() => {
            const s = new Date().getTime(); debugger;
            if (new Date().getTime() - s > 100 && !devtoolsDetected) {
                devtoolsDetected = true; window.location.replace(REDIRECT_URL);
            }
        }, 1000);
        document.addEventListener('keydown', e => {
            if (e.key==='F12' || (e.ctrlKey && e.shiftKey && ['I','C','J'].includes(e.key)) || (e.ctrlKey && e.key==='U')) {
                e.preventDefault(); window.location.replace(REDIRECT_URL);
            }
        });

        // ============================================================
        // MENÚ TOGGLE
        // ============================================================
        function toggleMenu() {
            menuOpen = !menuOpen;
            document.getElementById('menu-panel').classList.toggle('open', menuOpen);
            document.getElementById('bi-overlay').classList.toggle('open', menuOpen);
            document.getElementById('btn-menu-toggle').classList.toggle('open', menuOpen);
        }

        function cerrarMenu() {
            menuOpen = false;
            document.getElementById('menu-panel').classList.remove('open');
            document.getElementById('bi-overlay').classList.remove('open');
            document.getElementById('btn-menu-toggle').classList.remove('open');
        }

        // ============================================================
        // BARRA DE FECHA (botón reloj)
        // ============================================================
        let fechaBarOpen = false;
        function toggleFechaBar() {
            fechaBarOpen = !fechaBarOpen;
            document.getElementById('bi-update-badge').classList.toggle('open', fechaBarOpen);
            document.getElementById('btn-fecha-toggle').classList.toggle('open', fechaBarOpen);
        }

        // ============================================================
        // HELP DESK — abre el formulario REAL de Tally (conectado a
        // Notion desde el lado de Tally, no se toca nada de eso acá)
        // como popup encima del BI, vía el widget oficial embed.js
        // ============================================================
        const TALLY_FORM_ID = 'TU_FORM_ID_AQUI'; // <-- reemplazar por el ID real de tu formulario de Tally

        function abrirHelpDesk() {
            cerrarMenu();
            if (typeof Tally === 'undefined') {
                alert('El formulario de soporte no cargó todavía. Intenta de nuevo en un segundo.');
                return;
            }
            let linkReal = '';
            try { if (reporteActivo && reporteActivo.url) linkReal = decodeUrl(reporteActivo.url); } catch(e) {}
            Tally.openPopup(TALLY_FORM_ID, {
                layout: 'modal',
                width: 500,
                hiddenFields: {
                    reporte: reporteActivo ? reporteActivo.nombre : '',
                    linkbi: linkReal,
                    correo: localStorage.getItem('oikos_user_email') || ''
                }
            });
        }

        // ============================================================
        // PDF
        // ============================================================
        function descargarPDF() {
            if (!reporteActivo || !reporteActivo.pdfUrl) {
                alert("No hay PDF disponible para este reporte aún.");
                return;
            }
            const btn = document.getElementById('btn-pdf');
            btn.disabled = true;
            btn.innerHTML = `<svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite;width:17px;height:17px;fill:white"><path d="M12 4V2A10 10 0 0 0 2 12h2a8 8 0 0 1 8-8z"/></svg> Abriendo...`;
            window.open(reporteActivo.pdfUrl, '_blank');
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg> Ver / Descargar PDF`;
            }, 2000);
        }

        // ============================================================
        // NAVEGACIÓN
        // ============================================================
        function volverHome() {
            cerrarMenu();
            // Ocultar todo primero
            document.getElementById('bi-container').style.display = 'none';
            document.getElementById('bi-frame').src = '';
            const preloader = document.getElementById('preloader');
            preloader.classList.remove('visible');
            preloader.style.opacity = '';
            preloader.style.transition = '';
            reporteActivo = null;
            localStorage.removeItem('oikos_reporte_activo');
            const saved = JSON.parse(localStorage.getItem('oikos_auth_token'));
            if (saved && saved.reportes && saved.reportes.length > 1) {
                showReportSelector(saved.reportes);
            } else {
                window.location.reload();
            }
        }

        function securityReset() { window.location.replace(REDIRECT_URL); }

        // ============================================================
        // ENCODE / DECODE
        // ============================================================
        function encodeUrl(url) { return btoa(btoa(url).split('').reverse().join('')); }
        function decodeUrl(enc) { return atob(atob(enc).split('').reverse().join('')); }

        // ============================================================
        // FECHA DE ACTUALIZACIÓN — lee E1 del sheet "Link Bi"
        // Se guarda en sessionStorage para no re-pedir en cada carga
        // ============================================================
        async function cargarFechaActualizacion() {
            try {
                // Primero buscar en sessionStorage para evitar llamadas extras
                const cached = sessionStorage.getItem('oikos_update_date');
                if (cached) { mostrarBadgeFecha(cached); return; }

                const res  = await fetch(`${API_URL}?action=getFechaActualizacion`);
                const data = await res.json();
                if (data.status === 'success' && data.fecha) {
                    sessionStorage.setItem('oikos_update_date', data.fecha);
                    mostrarBadgeFecha(data.fecha);
                }
            } catch(e) { /* silencioso si falla */ }
        }

        // Actualiza TODOS los badges de fecha que existan en pantalla:
        // login (#update-badge), selector (#selector-badge) y BI (#bi-update-badge)
        function mostrarBadgeFecha(fecha) {
            // El sheet puede traer el texto "Última actualización:" incluido — lo quitamos para no duplicar
            const fechaLimpia = String(fecha).replace(/^\s*(actualizado|ultima\s+actualizacion|última\s+actualizaci[oó]n)\s*:\s*/i, '').trim();
            // Separar fecha y hora si vienen juntas (ej: "06/07/2026 08:10:40")
            const partes    = fechaLimpia.match(/^(\S+)\s+(.+)$/);
            const soloFecha = partes ? partes[1] : fechaLimpia;
            const soloHora  = partes ? partes[2] : '';

            const svgIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;opacity:0.9;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`;
            // Badges pill (login y selector)
            ['update-badge', 'selector-badge'].forEach(id => {
                const badge = document.getElementById(id);
                if (!badge) return;
                badge.innerHTML = `${svgIcon} Actualizado: ${fechaLimpia}`;
                badge.style.display = 'flex';
            });
            // Barra alargada dentro del BI (colgando del borde superior derecho)
            const biBadge = document.getElementById('bi-update-badge');
            if (biBadge) {
                biBadge.innerHTML = `
                    <span class="badge-dot"></span>
                    <span class="badge-label">Última actualización</span>
                    <span class="badge-sep"></span>
                    <span class="badge-fecha">${soloFecha}</span>
                    ${soloHora ? `<span class="badge-hora">${soloHora}</span>` : ''}`;
                biBadge.style.display = 'flex';
            }
        }

        // ============================================================
        // OCULTAR LOGIN INMEDIATAMENTE si ya hay sesión + reporte activo
        // (evita el flash del formulario al duplicar pestaña)
        // ============================================================
        (function() {
            try {
                const saved = JSON.parse(localStorage.getItem('oikos_auth_token'));
                const rep   = localStorage.getItem('oikos_reporte_activo');
                if (saved && rep && (new Date().getTime() - saved.time < SESSION_DURATION)) {
                    document.getElementById('login-ui').style.display = 'none';
                    document.getElementById('preloader').classList.add('visible');
                    const nombre = JSON.parse(rep).nombre || 'Cargando reporte...';
                    document.getElementById('preloader-report-name').textContent = nombre;
                }
            } catch(e) {}
        })();

        // ============================================================
        // SESIÓN
        // ============================================================
        window.onload = () => {
            cargarFechaActualizacion(); // siempre, sin importar la ruta de entrada
            const saved = JSON.parse(localStorage.getItem('oikos_auth_token'));
            if (saved && (new Date().getTime() - saved.time < SESSION_DURATION)) {
                const reporteGuardado = localStorage.getItem('oikos_reporte_activo');
                if (reporteGuardado) {
                    const rep = JSON.parse(reporteGuardado);
                    loadReport(rep);
                } else {
                    showReportSelector(saved.reportes);
                }
            }
        };

        function salidaSegura() {
            localStorage.clear(); sessionStorage.clear();
            document.cookie.split(";").forEach(c => {
                document.cookie = c.replace(/^ +/,"").replace(/=.*/,"=;expires="+new Date().toUTCString()+";path=/");
            });
            window.location.href = window.location.href.split('?')[0] + '?t=' + new Date().getTime();
        }

        function setStatus(m, c="#64748b") {
            const el = document.getElementById('status-msg');
            if (el) { el.innerText = m; el.style.color = c; }
        }

        // ============================================================
        // AUTH
        // ============================================================
        async function requestToken() {
            const mail = document.getElementById('email').value;
            if (!mail.includes('@')) return setStatus("Correo no válido","#ef4444");
            setStatus("Enviando clave...","#004a99");
            try {
                const res  = await fetch(`${API_URL}?action=solicitar&correo=${encodeURIComponent(mail)}`);
                const data = await res.json();
                setStatus(data.status==='sent' ? "¡Clave enviada! Válida por 12h." : data.message,
                          data.status==='sent' ? "#10b981" : "#ef4444");
            } catch(e) { setStatus("Error de red","#ef4444"); }
        }

        async function verifyToken() {
            const mail = document.getElementById('email').value;
            const tk   = document.getElementById('token').value;
            if (!mail || !tk) return setStatus("Completa los datos","#ef4444");
            setStatus("Verificando acceso...","#004a99");
            try {
                const res  = await fetch(`${API_URL}?action=validar&correo=${encodeURIComponent(mail)}&token=${encodeURIComponent(tk)}`);
                const data = await res.json();
                if (data.status === 'success') {
                    const reportesOfuscados = data.reportes.map(r => ({
                        nombre: r.nombre,
                        url:    encodeUrl(r.url),
                        pdfUrl: r.pdfUrl || null
                    }));
                    localStorage.setItem('oikos_auth_token', JSON.stringify({
                        time: new Date().getTime(),
                        reportes: reportesOfuscados
                    }));
                    localStorage.setItem('oikos_user_email', mail);
                    showReportSelector(reportesOfuscados);
                } else {
                    setStatus(data.message,"#ef4444");
                }
            } catch(e) { setStatus("Falla de validación","#ef4444"); }
        }

        // ============================================================
        // SELECTOR DE REPORTES
        // ============================================================
        function showReportSelector(reportes) {
            if (reportes.length === 1) { loadReport(reportes[0]); return; }

            const cachedFecha = sessionStorage.getItem('oikos_update_date');

            // Usar el selector-overlay en vez de pisar el login-ui completo
            let overlay = document.getElementById('selector-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'selector-overlay';
                overlay.style.cssText = `
                    position:fixed;inset:0;z-index:999998;
                    display:flex;align-items:center;justify-content:center;
                    background:linear-gradient(135deg,#f0f4ff 0%,#e8ecf9 100%);
                `;
                // Círculos decorativos
                overlay.innerHTML = `
                    <div style="position:absolute;border-radius:50%;opacity:0.15;filter:blur(50px);
                        width:300px;height:300px;background:#004a99;top:-100px;left:-100px;"></div>
                    <div style="position:absolute;border-radius:50%;opacity:0.15;filter:blur(50px);
                        width:400px;height:400px;background:#00d2ff;bottom:-150px;right:-150px;"></div>
                    <div id="selector-card" style="
                        display:flex;background:white;border-radius:28px;
                        box-shadow:0 40px 100px rgba(0,0,0,0.1);
                        max-width:1000px;width:92%;min-height:600px;
                        overflow:hidden;position:relative;z-index:1;
                        animation:slideUp 0.5s ease-out;
                    ">
                        <div style="flex:1.2;padding:50px 60px;display:flex;flex-direction:column;justify-content:center;text-align:center;">
                            <div style="font-family:Outfit,sans-serif;font-size:32px;font-weight:800;color:#004a99;margin-bottom:40px;letter-spacing:-1px;">OIKOS Analytics</div>
                            <h2 style="font-family:Outfit,sans-serif;font-size:26px;color:#1e293b;margin-bottom:12px;">Selecciona tu Reporte</h2>
                            <p style="font-size:13px;color:#64748b;margin-bottom:25px;line-height:1.5;">Elige el dashboard que deseas visualizar</p>
                            <div style="display:flex;flex-direction:column;margin-top:10px;" id="selector-btns"></div>
                            <button onclick="salidaSegura()" style="width:100%;padding:10px 20px;background:white;color:#64748b;border:2px solid #e2e8f0;border-radius:10px;font-weight:600;font-family:Outfit,sans-serif;cursor:pointer;font-size:12px;margin-top:20px;transition:0.3s;">🔒 SALIDA SEGURA</button>
                            <div id="selector-badge" style="display:${cachedFecha?'flex':'none'};align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:10px 18px;background:linear-gradient(135deg,#004a99 0%,#0077d9 60%,#00d2ff 140%);border:1px solid rgba(0,210,255,0.4);border-radius:20px;font-size:11.5px;font-weight:700;color:white;letter-spacing:0.4px;box-shadow:0 6px 18px rgba(0,74,153,0.35),inset 0 1px 0 rgba(255,255,255,0.25);">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;opacity:0.9;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                                ${cachedFecha ? 'Actualizado: '+cachedFecha : ''}
                            </div>
                        </div>
                        <div style="flex:1;background:linear-gradient(150deg,#004a99 0%,#003366 100%);padding:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:white;">
                            <h1 style="font-family:Outfit,sans-serif;font-size:44px;margin-bottom:20px;">Analytics</h1>
                            <p style="font-size:15px;opacity:0.8;line-height:1.6;max-width:280px;">Grupo Empresarial OIKOS S.A.S</p>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
            } else {
                overlay.style.display = 'flex';
            }

            // Renderizar botones
            const btnsDiv = document.getElementById('selector-btns');
            btnsDiv.innerHTML = reportes.map((r, idx) => `
                <button onclick="loadReportFromSession(${idx})" style="
                    width:100%;padding:18px;background:${idx===1?'#9C182F':'#004a99'};color:white;
                    border:none;border-radius:14px;font-weight:700;font-family:Outfit,sans-serif;
                    cursor:pointer;transition:0.3s;box-shadow:0 10px 25px rgba(0,0,0,0.15);margin-bottom:12px;
                    font-size:15px;
                " onmouseover="this.style.opacity='0.88';this.style.transform='translateY(-2px)'"
                   onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'">
                    ${r.nombre}
                </button>`).join('');

            // Actualizar badge si hay fecha
            const badge = document.getElementById('selector-badge');
            if (badge && cachedFecha) {
                badge.style.display = 'flex';
                badge.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;opacity:0.9;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Actualizado: ${cachedFecha}`;
            }

            // Ocultar login original
            document.getElementById('login-ui').style.display = 'none';

            if (!cachedFecha) cargarFechaActualizacion();
        }

        function ocultarSelector() {
            const overlay = document.getElementById('selector-overlay');
            if (overlay) overlay.style.display = 'none';
        }

        function loadReportFromSession(idx) {
            const saved = JSON.parse(localStorage.getItem('oikos_auth_token'));
            if (saved && saved.reportes[idx]) loadReport(saved.reportes[idx]);
        }

        function loadReport(reporte) {
            const realUrl = decodeUrl(reporte.url);
            reporteActivo = { nombre: reporte.nombre, pdfUrl: reporte.pdfUrl || null, url: reporte.url };

            // Guardar reporte activo para duplicar pestaña
            localStorage.setItem('oikos_reporte_activo', JSON.stringify({
                nombre: reporte.nombre, url: reporte.url, pdfUrl: reporte.pdfUrl || null
            }));

            // Ocultar selector y login
            ocultarSelector();
            document.getElementById('login-ui').style.display = 'none';

            // Generar botón "Ir a [otro reporte]" en el menú
            const saved = JSON.parse(localStorage.getItem('oikos_auth_token'));
            const switchWrap = document.getElementById('btn-switch-wrap');
            if (switchWrap && saved && saved.reportes.length > 1) {
                const otroIdx   = saved.reportes.findIndex(r => r.nombre !== reporte.nombre);
                const otroNombre = otroIdx >= 0 ? saved.reportes[otroIdx].nombre : null;
                if (otroNombre) {
                    switchWrap.innerHTML = `
                        <button class="menu-btn" id="btn-switch" onclick="loadReportFromSession(${otroIdx})">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:17px;height:17px;fill:white;flex-shrink:0;">
                                <path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/>
                            </svg>
                            Ir a ${otroNombre}
                        </button>`;
                } else {
                    switchWrap.innerHTML = '';
                }
            }

            // Mostrar PDF button
            const btnPdf = document.getElementById('btn-pdf');
            if (btnPdf) btnPdf.style.display = reporteActivo.pdfUrl ? 'flex' : 'none';

            // Preloader
            const preloader = document.getElementById('preloader');
            const preloaderName = document.getElementById('preloader-report-name');
            if (preloaderName) preloaderName.textContent = reporte.nombre;
            // Reiniciar animación de la barra
            const bar = preloader.querySelector('.preloader-bar');
            if (bar) { bar.style.animation = 'none'; bar.offsetHeight; bar.style.animation = 'barFill 1.8s 0.5s cubic-bezier(0.4,0,0.2,1) forwards'; }
            preloader.classList.add('visible');

            // Cargar iframe
            const frame = document.getElementById('bi-frame');
            frame.src = realUrl;

            frame.onload = () => {
                preloader.style.transition = 'opacity 0.5s ease';
                preloader.style.opacity = '0';
                setTimeout(() => {
                    preloader.classList.remove('visible');
                    preloader.style.opacity = '';
                    preloader.style.transition = '';
                }, 500);
                document.getElementById('bi-container').style.display = 'block';
            };

            // Fallback 4s
            setTimeout(() => {
                if (preloader.classList.contains('visible')) {
                    preloader.style.transition = 'opacity 0.5s ease';
                    preloader.style.opacity = '0';
                    setTimeout(() => {
                        preloader.classList.remove('visible');
                        preloader.style.opacity = '';
                        preloader.style.transition = '';
                    }, 500);
                    document.getElementById('bi-container').style.display = 'block';
                }
            }, 4000);

            // Mostrar fecha de actualización dentro del BI
            const cachedFecha = sessionStorage.getItem('oikos_update_date');
            if (cachedFecha) mostrarBadgeFecha(cachedFecha);
            else cargarFechaActualizacion();
        }
    </script>
</body>
</html>
